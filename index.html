<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>省会马拉松地图</title>
    <meta
      name="description"
      content="用中国地图记录省会马拉松收集进度，绿色表示已完成，灰色表示未完成。"
    />
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body>
    <div class="page-shell">
      <div class="preview-alert" id="previewAlert" hidden></div>

      <header class="hero-card">
        <div class="section-kicker hero-frame-title">柿子 · 奔跑在路上</div>
        <section class="runner-card" aria-label="个人成绩">
          <div class="runner-stats">
            <div class="runner-stat">
              <span class="runner-stat-name">全马 PB</span>
              <strong class="runner-stat-value" id="fullMarathonPbValue">待填写</strong>
              <span class="runner-stat-event" id="fullMarathonPbEvent">待填写</span>
              <div class="runner-stat-footer">
                <span class="runner-stat-date-label">完赛日期</span>
                <strong class="runner-stat-date" id="fullMarathonPbDate"></strong>
              </div>
            </div>
            <div class="runner-stat">
              <span class="runner-stat-name">半马 PB</span>
              <strong class="runner-stat-value" id="halfMarathonPbValue">待填写</strong>
              <span class="runner-stat-event" id="halfMarathonPbEvent">待填写</span>
              <div class="runner-stat-footer">
                <span class="runner-stat-date-label">完赛日期</span>
                <strong class="runner-stat-date" id="halfMarathonPbDate"></strong>
              </div>
            </div>
            <div class="runner-stat">
              <span class="runner-stat-name">ITRA 表现分</span>
              <strong class="runner-stat-value" id="itraPerformanceValue">待填写</strong>
              <span class="runner-stat-event" id="itraPerformanceEvent">待填写</span>
              <div class="runner-stat-footer">
                <span class="runner-stat-date-label">完赛日期</span>
                <strong class="runner-stat-date" id="itraPerformanceDate"></strong>
              </div>
            </div>
            <div class="runner-stat">
              <span class="runner-stat-name">UTMB 表现分</span>
              <strong class="runner-stat-value" id="utmbPerformanceValue">待填写</strong>
              <span class="runner-stat-event" id="utmbPerformanceEvent">待填写</span>
              <div class="runner-stat-footer">
                <span class="runner-stat-date-label">完赛日期</span>
                <strong class="runner-stat-date" id="utmbPerformanceDate"></strong>
              </div>
            </div>
          </div>
        </section>
      </header>

      <main class="content-grid">
        <section class="major-card" aria-label="中国大满贯赛事">
          <div class="section-heading major-heading">
            <div class="major-heading-panel">
              <h2>中国大满贯赛事</h2>
            </div>
          </div>
          <div class="major-grid" id="majorRaceGrid"></div>
        </section>

        <section class="map-card">
          <div class="section-heading">
            <div class="map-heading-panel">
              <h2>省会马拉松集邮册</h2>
              <div class="hero-tags">
                <span class="hero-tag done">绿色省份代表已点亮</span>
                <span class="hero-tag pending">灰色省份代表未完成</span>
              </div>
            </div>
            <div class="map-overview">
              <div class="progress-panel map-progress-panel">
                <div class="progress-summary">
                  <div class="progress-ring" id="progressRing">
                    <div class="progress-inner">
                      <strong class="progress-value" id="progressValue">0 / 31</strong>
                      <span class="progress-label">已完成</span>
                    </div>
                  </div>
                </div>
              </div>

              <div class="next-stop map-next-stop">
                <p class="next-stop-label">下一站</p>
                <strong class="next-stop-city" id="nextStopCity">待定</strong>
                <p class="next-stop-date" id="nextStopDate">比赛日期 · 待填写</p>
              </div>
            </div>
          </div>
          <div id="map" aria-label="中国省会马拉松进度地图"></div>
        </section>
      </main>
    </div>

    <script>
      if (window.location.protocol === "file:") {
        const previewAlert = document.getElementById("previewAlert");
        if (previewAlert) {
          previewAlert.hidden = false;
          previewAlert.innerHTML =
            "当前是直接打开本地文件（file://），浏览器会拦截模块脚本或地图数据读取，所以页面看起来像“没有数据”。请在项目目录运行 <code>python3 -m http.server 8000</code>，再访问 <code>http://localhost:8000</code>。";
        }
      }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
    <script type="module" src="scripts/app.js"></script>
  </body>
</html>
